<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .header { background: #32424f; color: white; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #e2e8f0; }
        .btn { background: #32424f; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn-del { background: #e53e3e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .form-inline { margin-bottom: 20px; }
        .form-inline input { padding: 8px; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Attendance Dashboard</h2>
            <p>📅 <b>Date:</b> {{ date }} | 📆 <b>Day:</b> {{ day }} | 🕒 <b>Time:</b> {{ time }}</p>
        </div>

        <a href="/history" class="btn">📜 View Full History</a>
        <br><br>

        <h3>Add New Student</h3>
        <form action="/add_student" method="POST" class="form-inline">
            <input type="text" name="student_id" placeholder="Roll No" required>
            <input type="text" name="student_name" placeholder="Student Name" required>
            <button type="submit" class="btn">Add Student</button>
        </form>

        <hr>

        <h3>Mark Attendance</h3>
        <form action="/mark" method="POST">
            <table>
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student.id }}</td>
                        <td>{{ student.name }}</td>
                        <td>
                            <label><input type="radio" name="{{ student.id }}" value="Present" checked> Present</label>
                            <label><input type="radio" name="{{ student.id }}" value="Absent"> Absent</label>
                        </td>
                        <td>
                            <button type="submit" formmethod="POST" formaction="/delete_student/{{ student.id }}" class="btn-del" onclick="return confirm('Remove this student?')">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <br>
            <button type="submit" class="btn" style="background: #2b6cb0; width: 100%; padding: 12px;">Save Attendance</button>
        </form>
    </div>
</body>
</html>
